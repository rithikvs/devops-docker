<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Networking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Docker Networking Controller</h1>
            <p>Test Docker network isolation</p>
        </div>

        <div class="content">
            <div class="controls">
                <h3>Step 1: Create Networks</h3>
                <div class="button-row">
                    <button onclick="createNetwork1()">Create Network1</button>
                    <button onclick="createNetwork2()">Create Network2</button>
                </div>

                <h3>Step 2: Start Containers</h3>
                <button class="full-width" onclick="startContainers()">Start Containers</button>

                <h3>Step 3: Test Isolation</h3>
                <button class="full-width" onclick="testIsolation()">Test Isolation (Before)</button>

                <h3>Step 4: Connect Networks</h3>
                <button class="full-width" onclick="connectNetworks()">Connect Networks</button>

                <h3>Step 5: Test Communication</h3>
                <button class="full-width" onclick="testCommunication()">Test Communication (After)</button>

                <h3>Cleanup</h3>
                <button class="full-width danger" onclick="cleanup()">Cleanup All</button>
            </div>

            <div class="output">
                <h3>Output</h3>
                <div id="output" class="output-box"></div>
            </div>
        </div>

        <div class="footer">
            <span id="serverStatus">Server: Checking...</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
