services:
  nginx-network1:
    image: nginx:latest
    container_name: nginx-net1
    networks:
      - network1
    ports:
      - "80:80"   # 🔥 changed here
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html

  nginx-network2:
    image: nginx:latest
    container_name: nginx-net2
    networks:
      - network2
    ports:
      - "8082:80"   # keep this as extra
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html

networks:
  network1:
    driver: bridge
    name: network1
  network2:
    driver: bridge
    name: network2